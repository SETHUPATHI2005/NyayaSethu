<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - NyayaSethu</title>
  <link rel="stylesheet" href="global.css"/>
  <link rel="stylesheet" href="auth.css"/>
</head>
<body class="auth-page">
  <nav class="nav solid" id="mainNav">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <span class="logo-symbol">&#9878;</span>
        <span class="logo-text">Nyaya<strong>Sethu</strong></span>
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="register.html">Register</a></li>
      </ul>
    </div>
  </nav>

  <main class="auth-wrap">
    <section class="auth-card">
      <h1>Welcome Back</h1>
      <p>Login to continue using NyayaSethu legal services.</p>
      <form id="loginForm" class="auth-form">
        <label for="email">Email</label>
        <input id="email" type="email" required placeholder="you@example.com"/>

        <label for="password">Password</label>
        <input id="password" type="password" required placeholder="Enter your password"/>

        <button type="submit" class="btn-primary full-width">Login</button>
        <div id="authMsg" class="auth-msg"></div>
      </form>
      <div class="auth-foot">No account? <a href="register.html">Create one</a></div>
    </section>
  </main>

  <script src="auth.js"></script>
</body>
</html>
